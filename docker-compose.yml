services:
  qq-farm-bot-ui-pro:
    build:
      context: .
      dockerfile: core/Dockerfile
    container_name: qq-farm-bot-ui-pro
    restart: unless-stopped
    environment:
      ADMIN_PASSWORD: admin
      TZ: Asia/Shanghai
    ports:
      - "3100:3000"
    volumes:
      - ./data:/app/core/data
